k8s:
  log_list:
    - test-namespace/service/test
    - test-namespace/pod/test2
  floating_ips:
    - 127.0.0.1
  ingress_floating_ips:
    - 127.0.0.1
  # New toggleable options
  # enable_cert_manager: true   # true=force enable, false=force disable, omit=auto-detect
  # enable_kube_vip: true       # true=force enable, false=force disable, omit=auto-detect

# Kubernetes End-of-Life check (queries https://endoflife.date/api/kubernetes.json)
# eol:
#   enabled: true        # default: true
#   warn_days: 180       # alarm threshold in days before EOL (default: 180)

aws:
  endpoint_url: https://s3.test.com
  bucket: test-bucket
  access_key_id: test-key
  secret_access_key: test-secret-key

send_alarm: true
send_dm_alarm: true
